name: DevOps Blog CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t devops-blog .

    - name: Test container runs
      run: |
        docker run -d -p 80:80 --name test-blog devops-blog
        sleep 5
        curl http://localhost:80 | grep "DevOps Journey"
        docker stop test-blog
        docker rm test-blog

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
